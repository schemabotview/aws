<svg viewBox="0 0 720 396" width="720" height="396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* ── Light ──────────────────────────────────────── */
      .bg            { fill: #f9f9f8; }
      .canvas-border { stroke: #e8e8e4; fill: none; }

      .region-fill   { fill: #fff7ed; }
      .region-stroke { stroke: #f97316; }
      .region-text   { fill: #9a3412; }

      .az-fill       { fill: #eff6ff; }
      .az-stroke     { stroke: #60a5fa; }
      .az-text       { fill: #1e40af; }

      .dc-fill       { fill: #dbeafe; }
      .dc-stroke     { stroke: #3b82f6; }
      .dc-text       { fill: #1e3a8a; }

      .edge-fill     { fill: #f5f3ff; }
      .edge-stroke   { stroke: #a78bfa; }
      .edge-text     { fill: #5b21b6; }
      .elbox-fill    { fill: #ede9fe; }
      .elbox-stroke  { stroke: #7c3aed; }
      .elbox-text    { fill: #3b0764; }

      .wl-fill       { fill: #fff1f2; }
      .wl-stroke     { stroke: #fb7185; }
      .wl-text       { fill: #9f1239; }

      .lz-fill       { fill: #f0fdf4; }
      .lz-stroke     { stroke: #4ade80; }
      .lz-text       { fill: #166534; }

      .op-fill       { fill: #f8fafc; }
      .op-stroke     { stroke: #94a3b8; }
      .op-text       { fill: #334155; }

      .dashed        { stroke: #9ca3af; fill: none; stroke-dasharray: 5,4; }
      .fiber         { stroke: #93c5fd; fill: none; }
      .muted         { fill: #9b9b92; }
      .lbl           { font-family: system-ui, sans-serif; }

      /* ── Dark ───────────────────────────────────────── */
      @media (prefers-color-scheme: dark) {
        .bg            { fill: #222220; }
        .canvas-border { stroke: #333330; }

        .region-fill   { fill: #431407; }
        .region-stroke { stroke: #fb923c; }
        .region-text   { fill: #fed7aa; }

        .az-fill       { fill: #1e3a8a; }
        .az-stroke     { stroke: #60a5fa; }
        .az-text       { fill: #bfdbfe; }

        .dc-fill       { fill: #1e3560; }
        .dc-stroke     { stroke: #3b82f6; }
        .dc-text       { fill: #dbeafe; }

        .edge-fill     { fill: #2e1065; }
        .edge-stroke   { stroke: #a78bfa; }
        .edge-text     { fill: #ddd6fe; }
        .elbox-fill    { fill: #3b0764; }
        .elbox-stroke  { stroke: #a78bfa; }
        .elbox-text    { fill: #ede9fe; }

        .wl-fill       { fill: #4c0519; }
        .wl-stroke     { stroke: #fb7185; }
        .wl-text       { fill: #fecdd3; }

        .lz-fill       { fill: #052e16; }
        .lz-stroke     { stroke: #4ade80; }
        .lz-text       { fill: #bbf7d0; }

        .op-fill       { fill: #1e293b; }
        .op-stroke     { stroke: #475569; }
        .op-text       { fill: #e2e8f0; }

        .dashed        { stroke: #4b5563; }
        .fiber         { stroke: #3b82f6; }
        .muted         { fill: #6b6b65; }
      }
    </style>
    <marker id="arr-dash" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="720" height="396" rx="10" class="bg canvas-border" stroke-width="1"/>

  <!-- ══ REGION ══════════════════════════════════════════════ -->
  <rect x="12" y="12" width="440" height="258" rx="10" class="region-fill region-stroke" stroke-width="2"/>
  <text x="232" y="34" font-size="12" font-weight="700" text-anchor="middle" class="lbl region-text">Region: us-east-1 (N. Virginia)</text>
  <text x="232" y="48" font-size="8" text-anchor="middle" class="lbl muted">Independent geographic area — own power, networking, connectivity</text>

  <!-- ── AZ 1 ── -->
  <rect x="22"  y="56" width="130" height="202" rx="7" class="az-fill az-stroke" stroke-width="1.5"/>
  <text x="87"  y="73" font-size="9" font-weight="700" text-anchor="middle" class="lbl az-text">AZ: us-east-1a</text>
  <!-- DC 1a-1 -->
  <rect x="30"  y="80" width="114" height="72" rx="5" class="dc-fill dc-stroke" stroke-width="1.2"/>
  <text x="87"  y="109" font-size="8.5" font-weight="600" text-anchor="middle" class="lbl dc-text">Data Center</text>
  <text x="87"  y="123" font-size="7" text-anchor="middle" class="lbl muted">redundant power</text>
  <text x="87"  y="134" font-size="7" text-anchor="middle" class="lbl muted">&amp; networking</text>
  <!-- DC 1a-2 -->
  <rect x="30"  y="162" width="114" height="72" rx="5" class="dc-fill dc-stroke" stroke-width="1.2"/>
  <text x="87"  y="191" font-size="8.5" font-weight="600" text-anchor="middle" class="lbl dc-text">Data Center</text>
  <text x="87"  y="205" font-size="7" text-anchor="middle" class="lbl muted">redundant power</text>
  <text x="87"  y="216" font-size="7" text-anchor="middle" class="lbl muted">&amp; networking</text>
  <text x="87"  y="248" font-size="7" text-anchor="middle" class="lbl az-text">isolated fault domain</text>

  <!-- ── AZ 2 ── -->
  <rect x="162" y="56" width="130" height="202" rx="7" class="az-fill az-stroke" stroke-width="1.5"/>
  <text x="227" y="73" font-size="9" font-weight="700" text-anchor="middle" class="lbl az-text">AZ: us-east-1b</text>
  <rect x="170" y="80" width="114" height="72" rx="5" class="dc-fill dc-stroke" stroke-width="1.2"/>
  <text x="227" y="109" font-size="8.5" font-weight="600" text-anchor="middle" class="lbl dc-text">Data Center</text>
  <text x="227" y="123" font-size="7" text-anchor="middle" class="lbl muted">redundant power</text>
  <text x="227" y="134" font-size="7" text-anchor="middle" class="lbl muted">&amp; networking</text>
  <rect x="170" y="162" width="114" height="72" rx="5" class="dc-fill dc-stroke" stroke-width="1.2"/>
  <text x="227" y="191" font-size="8.5" font-weight="600" text-anchor="middle" class="lbl dc-text">Data Center</text>
  <text x="227" y="205" font-size="7" text-anchor="middle" class="lbl muted">redundant power</text>
  <text x="227" y="216" font-size="7" text-anchor="middle" class="lbl muted">&amp; networking</text>
  <text x="227" y="248" font-size="7" text-anchor="middle" class="lbl az-text">isolated fault domain</text>

  <!-- ── AZ 3 ── -->
  <rect x="302" y="56" width="130" height="202" rx="7" class="az-fill az-stroke" stroke-width="1.5"/>
  <text x="367" y="73" font-size="9" font-weight="700" text-anchor="middle" class="lbl az-text">AZ: us-east-1c</text>
  <rect x="310" y="80" width="114" height="72" rx="5" class="dc-fill dc-stroke" stroke-width="1.2"/>
  <text x="367" y="109" font-size="8.5" font-weight="600" text-anchor="middle" class="lbl dc-text">Data Center</text>
  <text x="367" y="123" font-size="7" text-anchor="middle" class="lbl muted">redundant power</text>
  <text x="367" y="134" font-size="7" text-anchor="middle" class="lbl muted">&amp; networking</text>
  <rect x="310" y="162" width="114" height="72" rx="5" class="dc-fill dc-stroke" stroke-width="1.2"/>
  <text x="367" y="191" font-size="8.5" font-weight="600" text-anchor="middle" class="lbl dc-text">Data Center</text>
  <text x="367" y="205" font-size="7" text-anchor="middle" class="lbl muted">redundant power</text>
  <text x="367" y="216" font-size="7" text-anchor="middle" class="lbl muted">&amp; networking</text>
  <text x="367" y="248" font-size="7" text-anchor="middle" class="lbl az-text">isolated fault domain</text>

  <!-- Fiber lines between AZs -->
  <line x1="152" y1="156" x2="162" y2="156" stroke-width="2" class="fiber"/>
  <line x1="152" y1="160" x2="162" y2="160" stroke-width="2" class="fiber"/>
  <line x1="292" y1="156" x2="302" y2="156" stroke-width="2" class="fiber"/>
  <line x1="292" y1="160" x2="302" y2="160" stroke-width="2" class="fiber"/>

  <!-- Region footnote -->
  <text x="232" y="263" font-size="7.5" text-anchor="middle" class="lbl muted">← Low-latency fiber links between AZs →</text>

  <!-- ══ EDGE LOCATIONS ══════════════════════════════════════ -->
  <rect x="464" y="12" width="244" height="130" rx="10" class="edge-fill edge-stroke" stroke-width="1.8"/>
  <text x="586" y="32" font-size="11" font-weight="700" text-anchor="middle" class="lbl edge-text">Edge Locations</text>
  <text x="586" y="45" font-size="7.5" text-anchor="middle" class="lbl muted">CloudFront · Route 53 · WAF · Shield · Lambda@Edge</text>
  <rect x="474" y="52" width="100" height="46" rx="6" class="elbox-fill elbox-stroke" stroke-width="1.2"/>
  <text x="524" y="72" font-size="8.5" font-weight="600" text-anchor="middle" class="lbl elbox-text">Edge Location</text>
  <text x="524" y="86" font-size="7" text-anchor="middle" class="lbl muted">New York</text>
  <rect x="588" y="52" width="110" height="46" rx="6" class="elbox-fill elbox-stroke" stroke-width="1.2"/>
  <text x="643" y="72" font-size="8.5" font-weight="600" text-anchor="middle" class="lbl elbox-text">Edge Location</text>
  <text x="643" y="86" font-size="7" text-anchor="middle" class="lbl muted">London</text>
  <text x="586" y="116" font-size="9" font-weight="600" text-anchor="middle" class="lbl edge-text">400+ Points of Presence</text>
  <text x="586" y="130" font-size="7.5" text-anchor="middle" class="lbl muted">90+ cities · 40+ countries · not full regions</text>

  <!-- ══ WAVELENGTH ZONE ════════════════════════════════════ -->
  <rect x="464" y="152" width="244" height="90" rx="10" class="wl-fill wl-stroke" stroke-width="1.8"/>
  <text x="586" y="172" font-size="11" font-weight="700" text-anchor="middle" class="lbl wl-text">Wavelength Zone</text>
  <text x="586" y="186" font-size="7.5" text-anchor="middle" class="lbl muted">AWS compute inside 5G telecom networks</text>
  <text x="586" y="200" font-size="7.5" text-anchor="middle" class="lbl muted">Verizon · Vodafone · KDDI · SK Telecom</text>
  <text x="586" y="214" font-size="8" font-weight="600" text-anchor="middle" class="lbl wl-text">Ultra-low latency over 5G</text>
  <text x="586" y="228" font-size="7.5" text-anchor="middle" class="lbl muted">Connected vehicles · AR/VR · Smart factories</text>

  <!-- ══ LOCAL ZONE ══════════════════════════════════════════ -->
  <rect x="12" y="284" width="210" height="98" rx="8" class="lz-fill lz-stroke" stroke-width="1.8"/>
  <text x="117" y="304" font-size="11" font-weight="700" text-anchor="middle" class="lbl lz-text">Local Zone</text>
  <text x="117" y="318" font-size="7.5" text-anchor="middle" class="lbl muted">Metro extension of a region</text>
  <text x="117" y="331" font-size="7.5" text-anchor="middle" class="lbl muted">Single-digit ms latency</text>
  <text x="117" y="344" font-size="7.5" text-anchor="middle" class="lbl muted">e.g. us-east-1-bos-1  (Boston)</text>
  <text x="117" y="357" font-size="8" font-weight="600" text-anchor="middle" class="lbl lz-text">Gaming · Live streaming · Simulations</text>
  <text x="117" y="371" font-size="7" text-anchor="middle" class="lbl muted">No full redundancy — attached to parent region</text>
  <!-- dashed connector to region -->
  <line x1="117" y1="284" x2="117" y2="272" stroke-width="1.3" class="dashed" marker-end="url(#arr-dash)"/>

  <!-- ══ OUTPOSTS ════════════════════════════════════════════ -->
  <rect x="234" y="284" width="222" height="98" rx="8" class="op-fill op-stroke" stroke-width="1.8"/>
  <text x="345" y="304" font-size="11" font-weight="700" text-anchor="middle" class="lbl op-text">AWS Outposts</text>
  <text x="345" y="318" font-size="7.5" text-anchor="middle" class="lbl muted">Your on-premises data center</text>
  <text x="345" y="331" font-size="7.5" text-anchor="middle" class="lbl muted">AWS rack hardware shipped to you</text>
  <text x="345" y="344" font-size="7.5" text-anchor="middle" class="lbl muted">Same APIs · same console · local compute</text>
  <text x="345" y="357" font-size="8" font-weight="600" text-anchor="middle" class="lbl op-text">Compliance · Hybrid · On-prem latency</text>
  <text x="345" y="371" font-size="7" text-anchor="middle" class="lbl muted">Connected back to parent region over private link</text>
  <!-- dashed connector to region -->
  <line x1="345" y1="284" x2="345" y2="272" stroke-width="1.3" class="dashed" marker-end="url(#arr-dash)"/>

</svg>
